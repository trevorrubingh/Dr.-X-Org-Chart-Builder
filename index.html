<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Org Chart Builder</title>
<style>
  :root{
    --bg:#e9edf2;
    --grid:#d3dae2;
    --ink:#16233b;
    --muted:#5d6b80;
    --faint:#8b97a8;
    --line:#cdd5df;
    --panel:#ffffff;
    --accent:#2f5d99;
    --accent-soft:#e4ecf6;
    --direct:#3a4a66;
    --secondary:#93a0b2;
    --danger:#b23a48;
    --shadow:0 1px 2px rgba(20,35,59,.08),0 6px 18px rgba(20,35,59,.10);
    --radius:10px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:var(--bg);
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Toolbar ---------- */
  header{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:10px 16px;background:var(--panel);
    border-bottom:1px solid var(--line);z-index:30;
    box-shadow:0 1px 0 rgba(20,35,59,.03);
  }
  .brand{display:flex;align-items:baseline;gap:9px;margin-right:4px}
  .brand .mark{
    width:18px;height:18px;border-radius:4px;background:var(--accent);
    position:relative;flex:none;top:3px;
  }
  .brand .mark::after{
    content:"";position:absolute;left:4px;top:9px;width:10px;height:5px;
    border:1.5px solid #fff;border-top:none;border-radius:0 0 3px 3px;
  }
  .brand h1{font-size:15px;font-weight:700;letter-spacing:-.2px;margin:0}
  .brand span{font-size:11px;color:var(--faint);letter-spacing:.04em;text-transform:uppercase}

  .group{display:flex;align-items:center;gap:6px}
  .divider{width:1px;height:24px;background:var(--line);margin:0 2px}

  button.tool{
    font:inherit;font-size:13px;font-weight:550;color:var(--ink);
    background:var(--panel);border:1px solid var(--line);
    padding:7px 12px;border-radius:8px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;line-height:1;
    transition:background .12s,border-color .12s,color .12s;white-space:nowrap;
  }
  button.tool:hover{background:#f3f6fa;border-color:#bcc6d2}
  button.tool:active{background:#e9eef4}
  button.tool.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.tool.primary:hover{background:#27508a}
  button.tool.on{background:var(--accent-soft);border-color:#a9c3e2;color:var(--accent)}
  button.tool svg{width:15px;height:15px;display:block}
  button.ghost{background:transparent;border-color:transparent;color:var(--muted);padding:7px 9px}
  button.ghost:hover{background:#eef2f6;color:var(--ink)}

  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--panel)}
  .seg button{
    font:inherit;font-size:12.5px;font-weight:550;border:none;background:transparent;
    padding:7px 11px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:7px;
  }
  .seg button + button{border-left:1px solid var(--line)}
  .seg button.active{background:var(--accent-soft);color:var(--accent)}
  .seg .line-d{width:22px;height:0;border-top:2px solid currentColor}
  .seg .line-s{width:22px;height:0;border-top:2px dashed currentColor}

  .spacer{flex:1}
  .hint{
    font-size:12.5px;color:var(--muted);background:#f1f5f9;border:1px solid var(--line);
    padding:6px 11px;border-radius:20px;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
  }
  .hint b{color:var(--accent);font-weight:650}
  .hint .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none}

  /* ---------- Canvas ---------- */
  .stage{position:relative;flex:1;overflow:hidden;touch-action:none;background:
    radial-gradient(var(--grid) 1.3px, transparent 1.3px);
    background-size:22px 22px;background-position:-1px -1px;}
  .stage.connect{cursor:crosshair}
  .stage.panning{cursor:grabbing}
  .content{position:absolute;top:0;left:0;width:4200px;height:3000px;transform-origin:0 0;will-change:transform}
  svg.wires{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none}
  svg.wires .hit{stroke:transparent;stroke-width:18;fill:none;pointer-events:stroke;cursor:pointer}
  svg.wires path.body{fill:none;stroke-linejoin:round;stroke-linecap:round}
  svg.wires path.body.sel{stroke:var(--accent)!important}
  svg.wires polygon.head.sel{fill:var(--accent)!important;stroke:var(--accent)!important}

  /* ---------- Node ---------- */
  .node{
    position:absolute;width:190px;background:var(--panel);
    border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;user-select:none;
    transition:box-shadow .12s,border-color .12s;
  }
  .stage:not(.connect) .node{cursor:grab}
  .stage:not(.connect) .node:active{cursor:grabbing}
  .node .bar{height:5px;background:var(--c,#5d6b80)}
  .node .body{padding:9px 11px 11px}
  .node input{
    display:block;width:100%;border:none;background:transparent;font:inherit;color:inherit;
    padding:2px 3px;border-radius:5px;margin:0;outline:none;
  }
  .node input.role{font-weight:700;font-size:13.5px;letter-spacing:-.1px;color:var(--ink)}
  .node input.name{font-size:12.5px;color:var(--muted);margin-top:2px;font-weight:500}
  .node input::placeholder{color:var(--faint);font-weight:500}
  .stage:not(.connect) .node input:focus{background:#eef3f9;cursor:text}
  .stage.connect .node input{pointer-events:none}
  .node.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft),var(--shadow)}
  .node.same{border-color:#caa14a;box-shadow:0 0 0 2px #f3e6c4,var(--shadow)}
  .node.pending{border-color:var(--accent);box-shadow:0 0 0 3px #c5d9f1,var(--shadow)}
  .node .multi{
    position:absolute;top:6px;right:7px;font-size:10px;font-weight:700;color:#9a7b2e;
    background:#f6edd2;border-radius:10px;padding:1px 6px;letter-spacing:.02em;
  }
  /* division box — a structural label, no person */
  .node.division{width:180px;border-color:var(--db,#cdd5df);background:var(--dbg,#f4f6f9)}
  .node.division .bar{height:6px}
  .node.division .body{padding:8px 12px}
  .node.division input.label{
    font-weight:700;font-size:13px;letter-spacing:.02em;color:var(--ink);text-align:center;
    text-transform:uppercase;
  }
  .node.division input.label::placeholder{text-transform:none;letter-spacing:0}
  .node.division .tag{
    position:absolute;top:7px;left:8px;font-size:8.5px;font-weight:700;letter-spacing:.08em;
    color:var(--faint);text-transform:uppercase;pointer-events:none;
  }

  /* ---------- Floating mini toolbar ---------- */
  .mini{
    position:absolute;display:flex;align-items:center;gap:3px;
    background:var(--panel);border:1px solid var(--line);border-radius:9px;
    box-shadow:var(--shadow);padding:4px;z-index:20;
  }
  .mini .swatch{width:18px;height:18px;border-radius:5px;cursor:pointer;border:2px solid transparent}
  .mini .swatch.active{border-color:var(--ink)}
  .mini .typ{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .mini .typ button{padding:5px 8px;font-size:11px;font-weight:650;border-radius:0;color:var(--muted)}
  .mini .typ button + button{border-left:1px solid var(--line)}
  .mini .typ button.active{background:var(--accent-soft);color:var(--accent)}
  .mini .sep{width:1px;height:20px;background:var(--line);margin:0 3px}
  .mini button{
    border:none;background:transparent;cursor:pointer;border-radius:6px;padding:5px;
    display:flex;color:var(--muted)
  }
  .mini button:hover{background:#eef2f6;color:var(--ink)}
  .mini button.del:hover{background:#fbeaec;color:var(--danger)}
  .mini button svg{width:16px;height:16px;display:block}

  .apop{
    position:absolute;display:flex;gap:3px;align-items:center;z-index:21;
    background:var(--panel);border:1px solid var(--line);border-radius:9px;
    box-shadow:var(--shadow);padding:4px;transform:translate(-50%,-50%);
  }
  .apop button{font:inherit;font-size:12px;font-weight:550;border:none;background:transparent;
    padding:5px 8px;border-radius:6px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:6px}
  .apop button:hover{background:#eef2f6;color:var(--ink)}
  .apop button.active{color:var(--accent);background:var(--accent-soft)}
  .apop button.del:hover{background:#fbeaec;color:var(--danger)}
  .apop .ld{width:18px;border-top:2px solid currentColor}
  .apop .ls{width:18px;border-top:2px dashed currentColor}

  /* ---------- Multi-select ---------- */
  .marquee{position:absolute;border:1.5px solid var(--accent);background:rgba(47,93,153,.10);border-radius:3px;z-index:18;pointer-events:none}
  .gbar{position:absolute;display:flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--line);
    border-radius:9px;box-shadow:var(--shadow);padding:5px 6px 5px 11px;z-index:20}
  .gbar .lab{font-size:12px;font-weight:650;color:var(--accent);white-space:nowrap}
  .gbar .sep{width:1px;height:20px;background:var(--line);margin:0 2px}
  .gbar .swatch{width:16px;height:16px;border-radius:5px;cursor:pointer;border:2px solid transparent}
  .gbar .swatch:hover{border-color:var(--ink)}
  .gbar button{border:none;background:transparent;cursor:pointer;border-radius:6px;padding:5px;display:flex;color:var(--muted)}
  .gbar button:hover{background:#eef2f6;color:var(--ink)}
  .gbar button.del:hover{background:#fbeaec;color:var(--danger)}
  .gbar button svg{width:16px;height:16px;display:block}

  /* ---------- Legend ---------- */
  .legend{
    position:absolute;left:16px;bottom:16px;z-index:25;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);
    min-width:190px;max-width:230px;overflow:hidden;
  }
  .legend h2{
    margin:0;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);
    padding:9px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;
  }
  .legend h2 button{border:none;background:none;color:var(--faint);cursor:pointer;font-size:13px;padding:0}
  .legend .rows{padding:6px 8px;display:flex;flex-direction:column;gap:2px;max-height:200px;overflow:auto}
  .legend .lrow{display:flex;align-items:center;gap:8px;padding:2px 4px}
  .legend .chip{width:13px;height:13px;border-radius:4px;flex:none}
  .legend input{border:none;background:transparent;font:inherit;font-size:12.5px;color:var(--ink);
    width:100%;padding:3px 4px;border-radius:5px;outline:none}
  .legend input:focus{background:#eef3f9}
  .legend .key{font-size:11px;color:var(--faint);border-top:1px solid var(--line);padding:8px 12px;line-height:1.5}
  .legend .key b{color:var(--muted)}
  .legend .key .ld{display:inline-block;width:18px;border-top:2px solid var(--direct);transform:translateY(-3px)}
  .legend .key .ls{display:inline-block;width:18px;border-top:2px dashed var(--secondary);transform:translateY(-3px)}
  .legend.collapsed .rows,.legend.collapsed .key{display:none}

  /* ---------- Zoom controls ---------- */
  .zoom{
    position:absolute;right:16px;bottom:16px;z-index:25;display:flex;align-items:center;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);overflow:hidden;
  }
  .zoom button{border:none;background:transparent;cursor:pointer;color:var(--ink);
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:17px}
  .zoom button:hover{background:#f1f5f9}
  .zoom .lvl{min-width:48px;text-align:center;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;
    border-left:1px solid var(--line);border-right:1px solid var(--line);height:34px;display:flex;align-items:center;justify-content:center}
  .zoom .lvl:hover{background:#f1f5f9;color:var(--ink)}
  .zoom .fit{border-left:1px solid var(--line);width:auto;padding:0 12px;font-size:12.5px;font-weight:600;gap:6px}
  .zoom .fit svg{width:15px;height:15px}

  /* ---------- Empty state ---------- */
  .empty{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5;
  }
  .empty .card{text-align:center;color:var(--muted);pointer-events:auto}
  .empty svg{width:46px;height:46px;color:var(--faint);margin-bottom:10px}
  .empty h3{margin:0 0 6px;color:var(--ink);font-size:17px}
  .empty p{margin:0 0 16px;font-size:13.5px;max-width:340px}
  .empty .row{display:flex;gap:10px;justify-content:center}

  input[type=file]{display:none}
  @media (max-width:680px){
    .brand span,.hint{display:none}
    header{gap:8px;padding:8px 10px}
    .zoom .fit span{display:none}
    .zoom .fit{padding:0 9px}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="mark"></span>
    <h1>Org Chart Builder</h1>
    <span>v1</span>
  </div>

  <div class="group">
    <button class="tool primary" id="addBtn" title="Add a role (A)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Add role
    </button>
    <button class="tool" id="addDivBtn" title="Add a division / label box (D)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="6" rx="1.5"/><path d="M7 11v4M17 11v4M7 15h10" stroke-linecap="round"/></svg>
      Add division
    </button>
    <button class="tool" id="connectBtn" title="Draw reporting lines (C)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2.4"/><circle cx="18" cy="18" r="2.4"/><path d="M8 8l8 8" stroke-linecap="round"/></svg>
      Connect
    </button>
  </div>

  <div class="seg" id="styleSeg" title="Line style for new connections">
    <button data-style="direct" class="active"><span class="line-d"></span>Direct</button>
    <button data-style="secondary"><span class="line-s"></span>Secondary</button>
  </div>

  <div class="group">
    <button class="tool ghost" id="snapBtn" title="Snap boxes to grid (G)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="6" cy="6" r="1.2"/><circle cx="18" cy="6" r="1.2"/><circle cx="6" cy="18" r="1.2"/><circle cx="18" cy="18" r="1.2"/><circle cx="12" cy="12" r="1.2"/></svg>
      Snap
    </button>
  </div>

  <div class="spacer"></div>
  <div class="hint" id="hint"><span class="dot"></span><span id="hintText"></span></div>

  <div class="divider"></div>
  <div class="group">
    <button class="tool" id="fitTop" title="Fit whole chart in view (F)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4"/></svg>
      Fit
    </button>
    <button class="tool ghost" id="saveBtn" title="Save chart to a file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
      Save
    </button>
    <button class="tool ghost" id="openBtn" title="Open a saved chart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H3z"/><path d="M3 7V5a2 2 0 0 1 2-2h4l2 2"/></svg>
      Open
    </button>
    <button class="tool ghost" id="pngBtn" title="Export a PNG image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>
      Image
    </button>
    <input type="file" id="fileInput" accept="application/json,.json">
  </div>
</header>

<div class="stage" id="stage">
  <div class="content" id="content">
    <svg class="wires" id="wires" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div class="legend collapsed" id="legend">
  <h2>Divisions <button id="legendToggle" title="Show / hide">▸</button></h2>
  <div class="rows" id="legendRows"></div>
  <div class="key">
    <span class="ld"></span> <b>Direct report</b> &nbsp; <span class="ls"></span> <b>Secondary</b><br>
    One name can hold many roles — matching boxes glow gold when selected.
  </div>
</div>

<div class="zoom" id="zoom">
  <button id="zoomOut" title="Zoom out (−)">−</button>
  <div class="lvl" id="zoomLvl" title="Reset to 100%">100%</div>
  <button id="zoomIn" title="Zoom in (+)">+</button>
  <button class="fit" id="zoomFit" title="Fit whole chart in view (F)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4"/></svg>
    <span>Fit</span>
  </button>
</div>

<div class="empty" id="empty">
  <div class="card">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="3" width="6" height="5" rx="1"/><rect x="3" y="16" width="6" height="5" rx="1"/><rect x="15" y="16" width="6" height="5" rx="1"/><path d="M12 8v4M6 16v-2h12v2"/></svg>
    <h3>Start your org chart</h3>
    <p>Add a role, type the title and the person's name, then switch to Connect to draw reporting lines.</p>
    <div class="row">
      <button class="tool primary" id="emptyAdd">Add first role</button>
      <button class="tool" id="exampleBtn">Load NCN example</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- State ---------------- */
  const PALETTE = [
    {c:"#5d6b80", n:""},        // neutral
    {c:"#2f6bb0", n:"US"},
    {c:"#2f8f6b", n:"Global"},
    {c:"#b7791f", n:"Back office"},
    {c:"#7c5cbf", n:""},
    {c:"#b5485d", n:""},
    {c:"#3a8a9e", n:""}
  ];
  const COLORS = PALETTE.map(p=>p.c);

  let state = { boxes:[], arrows:[], legend:{} };
  let mode = "select";          // 'select' | 'connect'
  let lineStyle = "direct";     // for new arrows
  let selBox = null, selArrow = null, pendingSrc = null;
  let history = [];             // undo snapshots
  let zoom = 1, panX = 60, panY = 30;   // view transform
  const ZMIN = 0.25, ZMAX = 2;
  let snapGrid = true;          // snap-to-grid enabled
  const GRID_SIZE = 22;         // match visual grid background

  const stage   = document.getElementById("stage");
  const content = document.getElementById("content");
  const wires   = document.getElementById("wires");
  const empty   = document.getElementById("empty");
  const hintText= document.getElementById("hintText");
  const nodeEls = new Map();    // id -> element
  let mini=null, apop=null;

  const uid = (p)=>p+Math.random().toString(36).slice(2,8);

  /* ---------------- Persistence ---------------- */
  function snapshot(){ return JSON.parse(JSON.stringify({boxes:state.boxes,arrows:state.arrows,legend:state.legend})); }
  function snap(n){ return snapGrid ? Math.round(n/GRID_SIZE)*GRID_SIZE : n; }
  function pushHistory(){ history.push(snapshot()); if(history.length>40) history.shift(); }
  function autosave(){
    try{ if(window.storage&&window.storage.set){ window.storage.set("orgchart:auto", JSON.stringify(state), false).catch(()=>{}); } }catch(e){}
  }
  async function tryRestore(){
    try{
      if(window.storage&&window.storage.get){
        const r = await window.storage.get("orgchart:auto", false);
        if(r&&r.value){ const d=JSON.parse(r.value); if(d&&d.boxes&&d.boxes.length){ state=normalize(d); return true; } }
      }
    }catch(e){}
    return false;
  }
  function normalize(d){
    return {
      boxes:(d.boxes||[]).map(b=>({id:b.id||uid("b"),kind:b.kind==="division"?"division":"role",role:b.role||"",name:b.name||"",x:+b.x||80,y:+b.y||80,color:b.color||COLORS[0]})),
      arrows:(d.arrows||[]).map(a=>({id:a.id||uid("a"),from:a.from,to:a.to,type:a.type==="secondary"?"secondary":"direct"})).filter(a=>a.from&&a.to),
      legend:d.legend||{}
    };
  }
  function rgba(hex,a){
    const m=hex.replace("#",""); const r=parseInt(m.slice(0,2),16),g=parseInt(m.slice(2,4),16),b=parseInt(m.slice(4,6),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  /* ---------------- Boxes ---------------- */
  function addBox(kind,x,y){
    pushHistory();
    const sc=visibleCenter();
    const b={id:uid("b"),kind:kind==="division"?"division":"role",role:"",name:"",x:x??sc.x-95,y:y??sc.y-32,color:COLORS[0]};
    state.boxes.push(b);
    renderBoxes(); renderArrows(); selectBox(b.id);
    const el=nodeEls.get(b.id); if(el){ const r=el.querySelector(".role")||el.querySelector(".label"); r&&r.focus(); }
    afterChange();
  }
  function convertKind(id,kind){
    const b=state.boxes.find(x=>x.id===id); if(!b||b.kind===kind) return;
    pushHistory(); b.kind=kind;
    const el=nodeEls.get(id); if(el){ el.remove(); nodeEls.delete(id); }   // force rebuild with new structure
    renderBoxes(); renderArrows(); selectBox(id); afterChange();
  }
  function deleteBox(id){
    pushHistory();
    state.boxes=state.boxes.filter(b=>b.id!==id);
    state.arrows=state.arrows.filter(a=>a.from!==id&&a.to!==id);
    sel.delete(id); if(selBox===id) selBox=null;
    renderBoxes(); renderArrows(); clearMini(); clearGroupBar(); afterChange();
  }
  function duplicateBox(id){
    const b=state.boxes.find(x=>x.id===id); if(!b) return;
    pushHistory();
    const n={id:uid("b"),kind:b.kind,role:b.role,name:b.name,x:b.x+24,y:b.y+24,color:b.color};
    state.boxes.push(n); renderBoxes(); renderArrows(); selectBox(n.id); afterChange();
  }

  function renderBoxes(){
    // remove stale
    for(const [id,el] of nodeEls){ if(!state.boxes.find(b=>b.id===id)){ el.remove(); nodeEls.delete(id); } }
    for(const b of state.boxes){
      let el=nodeEls.get(b.id);
      if(!el){
        el=document.createElement("div");
        el.className="node"+(b.kind==="division"?" division":""); el.dataset.id=b.id;
        if(b.kind==="division"){
          el.innerHTML=`<div class="bar"></div><span class="tag">Division</span><div class="body">
              <input class="label" placeholder="Division name" maxlength="60"></div>`;
          const label=el.querySelector(".label");
          label.addEventListener("input",()=>{ b.role=label.value; afterChange(true); });
          label.addEventListener("keydown",ev=>{ if(ev.key==="Enter"){ev.preventDefault(); label.blur();}});
        } else {
          el.innerHTML=`<div class="bar"></div><div class="body">
              <input class="role" placeholder="Role / title" maxlength="60">
              <input class="name" placeholder="Person's name" maxlength="60"></div>
              <span class="multi" style="display:none"></span>`;
          const role=el.querySelector(".role"), name=el.querySelector(".name");
          role.addEventListener("input",()=>{ b.role=role.value; afterChange(true); });
          name.addEventListener("input",()=>{ b.name=name.value; refreshSame(); afterChange(true); });
          role.addEventListener("keydown",ev=>{ if(ev.key==="Enter"){ev.preventDefault(); name.focus();}});
          name.addEventListener("keydown",ev=>{ if(ev.key==="Enter"){ev.preventDefault(); name.blur();}});
        }
        content.appendChild(el); nodeEls.set(b.id,el);
      }
      el.querySelector(".bar").style.background=b.color;
      if(b.kind==="division"){
        el.querySelector(".label").value=b.role;
        el.style.setProperty("--dbg",rgba(b.color,0.10));
        el.style.setProperty("--db",rgba(b.color,0.45));
      } else {
        el.querySelector(".role").value=b.role;
        el.querySelector(".name").value=b.name;
      }
      el.style.left=b.x+"px"; el.style.top=b.y+"px";
    }
    updateMultiBadges();
    empty.style.display=state.boxes.length?"none":"flex";
    document.getElementById("legend").style.display=state.boxes.length?"":"none";
  }
  function updateNodePos(b){ const el=nodeEls.get(b.id); if(el){el.style.left=b.x+"px";el.style.top=b.y+"px";} }
  function boxRect(b){ const el=nodeEls.get(b.id); const w=el?el.offsetWidth:190,h=el?el.offsetHeight:64; return {x:b.x,y:b.y,w,h}; }

  function updateMultiBadges(){
    const counts={};
    state.boxes.forEach(b=>{ if(b.kind==="division")return; const k=(b.name||"").trim().toLowerCase(); if(k) counts[k]=(counts[k]||0)+1; });
    state.boxes.forEach(b=>{
      const el=nodeEls.get(b.id); if(!el) return;
      const badge=el.querySelector(".multi"); if(!badge) return;
      const k=(b.name||"").trim().toLowerCase();
      if(k&&counts[k]>1){ badge.style.display=""; badge.textContent=counts[k]+" roles"; }
      else badge.style.display="none";
    });
  }

  /* ---------------- Arrows ---------------- */
  const _f=(n)=>(Math.round(n*10)/10);
  function _box(id){ return state.boxes.find(b=>b.id===id); }

  // Shared bus per parent: all direct reports of one manager hang off one crossbar.
  let BUS={};
  function rebuildBus(){
    BUS={};
    const byParent={};
    state.arrows.forEach(a=>{ if(a.type!=="direct")return; (byParent[a.from]=byParent[a.from]||[]).push(a); });
    for(const pid in byParent){
      const P=_box(pid); if(!P) continue; const PR=boxRect(P);
      const below=byParent[pid].map(a=>_box(a.to)).filter(C=>C && C.y>=PR.y+PR.h-6);
      if(!below.length) continue;
      const minTop=Math.min(...below.map(C=>C.y));
      const pB=PR.y+PR.h, pcx=PR.x+PR.w/2;
      let busY=pB+26; if(busY>minTop-10) busY=pB+Math.max(8,(minTop-pB)/2);
      BUS[pid]={busY,pcx,pB};
    }
  }
  function dedupe(pts){ const o=[pts[0]]; for(let i=1;i<pts.length;i++){ const p=pts[i],q=o[o.length-1]; if(Math.abs(p.x-q.x)>0.1||Math.abs(p.y-q.y)>0.1)o.push(p);} return o; }
  function roundedPath(pts,r){
    pts=dedupe(pts);
    if(pts.length<3){ return "M "+pts.map(p=>`${_f(p.x)} ${_f(p.y)}`).join(" L "); }
    let d=`M ${_f(pts[0].x)} ${_f(pts[0].y)}`;
    for(let i=1;i<pts.length-1;i++){
      const p0=pts[i-1],p1=pts[i],p2=pts[i+1];
      const l1=Math.hypot(p1.x-p0.x,p1.y-p0.y)||1, l2=Math.hypot(p2.x-p1.x,p2.y-p1.y)||1;
      const rr=Math.min(r,l1/2,l2/2);
      const a={x:p1.x-(p1.x-p0.x)/l1*rr, y:p1.y-(p1.y-p0.y)/l1*rr};
      const b={x:p1.x+(p2.x-p1.x)/l2*rr, y:p1.y+(p2.y-p1.y)/l2*rr};
      d+=` L ${_f(a.x)} ${_f(a.y)} Q ${_f(p1.x)} ${_f(p1.y)} ${_f(b.x)} ${_f(b.y)}`;
    }
    const e=pts[pts.length-1]; d+=` L ${_f(e.x)} ${_f(e.y)}`;
    return d;
  }
  function endDir(pts){ const n=pts.length,e=pts[n-1],q=pts[n-2]; const l=Math.hypot(e.x-q.x,e.y-q.y)||1; return {end:e,dir:{x:(e.x-q.x)/l,y:(e.y-q.y)/l}}; }

  function elbowPoints(S,T){
    const sc={x:S.x+S.w/2,y:S.y+S.h/2}, tc={x:T.x+T.w/2,y:T.y+T.h/2};
    const dx=tc.x-sc.x, dy=tc.y-sc.y;
    const dyAbs=Math.abs(dy), dxAbs=Math.abs(dx);
    // if boxes are at very similar Y (snapped to same level), use a curved path instead of elbows
    if(dyAbs<10 && dxAbs>40){
      const mid=(sc.y+tc.y)/2;
      return [{x:sc.x,y:sc.y},{x:sc.x,y:mid},{x:tc.x,y:mid},{x:tc.x,y:tc.y}];
    }
    // normal elbow routing for offset boxes
    if(dyAbs>=dxAbs){
      const down=dy>=0, p1={x:sc.x,y:down?S.y+S.h:S.y}, p2={x:tc.x,y:down?T.y:T.y+T.h}, my=(p1.y+p2.y)/2;
      return [p1,{x:p1.x,y:my},{x:p2.x,y:my},p2];
    } else {
      const right=dx>=0, p1={x:right?S.x+S.w:S.x,y:sc.y}, p2={x:right?T.x:T.x+T.w,y:tc.y}, mx=(p1.x+p2.x)/2;
      return [p1,{x:mx,y:p1.y},{x:mx,y:p2.y},p2];
    }
  }
  function curvePath(S,T){
    const sc={x:S.x+S.w/2,y:S.y+S.h/2}, tc={x:T.x+T.w/2,y:T.y+T.h/2};
    const dx=tc.x-sc.x, dy=tc.y-sc.y;
    if(Math.abs(dy)>=Math.abs(dx)){
      const down=dy>=0, p1={x:sc.x,y:down?S.y+S.h:S.y}, p2={x:tc.x,y:down?T.y:T.y+T.h};
      const c=Math.max(30,Math.abs(p2.y-p1.y)/2);
      return {d:`M ${_f(p1.x)} ${_f(p1.y)} C ${_f(p1.x)} ${_f(p1.y+(down?c:-c))} ${_f(p2.x)} ${_f(p2.y-(down?c:-c))} ${_f(p2.x)} ${_f(p2.y)}`,end:p2,dir:{x:0,y:down?1:-1}};
    } else {
      const right=dx>=0, p1={x:right?S.x+S.w:S.x,y:sc.y}, p2={x:right?T.x:T.x+T.w,y:tc.y};
      const c=Math.max(30,Math.abs(p2.x-p1.x)/2);
      return {d:`M ${_f(p1.x)} ${_f(p1.y)} C ${_f(p1.x+(right?c:-c))} ${_f(p1.y)} ${_f(p2.x-(right?c:-c))} ${_f(p2.y)} ${_f(p2.x)} ${_f(p2.y)}`,end:p2,dir:{x:right?1:-1,y:0}};
    }
  }
  function pathFor(a){
    const P=_box(a.from), C=_box(a.to); if(!P||!C) return null;
    const PR=boxRect(P), CR=boxRect(C);
    if(a.type==="secondary") return curvePath(PR,CR);
    if(BUS[a.from] && CR.y>=PR.y+PR.h-6){               // shared-bus direct report
      const {busY,pcx,pB}=BUS[a.from]; const ccx=CR.x+CR.w/2;
      const pts=[{x:pcx,y:pB},{x:pcx,y:busY},{x:ccx,y:busY},{x:ccx,y:CR.y}];
      return {d:roundedPath(pts,9), ...endDir(pts)};
    }
    const pts=elbowPoints(PR,CR);                        // off-axis fallback
    return {d:roundedPath(pts,9), ...endDir(pts)};
  }
  function headPts(end,dir,grow){
    grow=grow||0; const s=9+grow, w=5+grow*0.55;
    const tip=end, base={x:end.x-dir.x*s,y:end.y-dir.y*s}, px=-dir.y, py=dir.x;
    return `${_f(tip.x)},${_f(tip.y)} ${_f(base.x+px*w)},${_f(base.y+py*w)} ${_f(base.x-px*w)},${_f(base.y-py*w)}`;
  }
  function renderArrows(){
    rebuildBus();
    while(wires.firstChild) wires.removeChild(wires.firstChild);
    const NS="http://www.w3.org/2000/svg";
    const edges=[];
    for(const a of state.arrows){ const p=pathFor(a); if(p) edges.push({a,p}); }
    const mk=(tag)=>document.createElementNS(NS,tag);
    const halo=getCss("--bg")||"#e9edf2";
    // pass 1 — halo (so crossings & overlaps read clearly, never lost "behind" a line/box)
    for(const {p} of edges){
      const c=mk("path"); c.setAttribute("d",p.d); c.setAttribute("fill","none");
      c.setAttribute("stroke",halo); c.setAttribute("stroke-width","6"); c.setAttribute("stroke-linejoin","round"); c.setAttribute("stroke-linecap","round");
      wires.appendChild(c);
      const hc=mk("polygon"); hc.setAttribute("points",headPts(p.end,p.dir,2.5)); hc.setAttribute("fill",halo); hc.setAttribute("stroke",halo); hc.setAttribute("stroke-width","3"); hc.setAttribute("stroke-linejoin","round");
      wires.appendChild(hc);
    }
    // pass 2 — coloured line bodies
    for(const {a,p} of edges){
      const sel=selArrow===a.id;
      const col=sel?getCss("--accent"):(a.type==="secondary"?getCss("--secondary"):getCss("--direct"));
      const body=mk("path"); body.setAttribute("d",p.d); body.setAttribute("fill","none");
      body.setAttribute("stroke",col); body.setAttribute("stroke-width",sel?"2.6":"2");
      body.setAttribute("stroke-linejoin","round"); body.setAttribute("stroke-linecap","round");
      if(a.type==="secondary") body.setAttribute("stroke-dasharray","6 5");
      wires.appendChild(body);
    }
    // pass 3 — arrowheads
    for(const {a,p} of edges){
      const sel=selArrow===a.id;
      const col=sel?getCss("--accent"):(a.type==="secondary"?getCss("--secondary"):getCss("--direct"));
      const h=mk("polygon"); h.setAttribute("points",headPts(p.end,p.dir,0)); h.setAttribute("fill",col); h.setAttribute("stroke",col); h.setAttribute("stroke-linejoin","round");
      wires.appendChild(h);
    }
    // pass 4 — transparent hit targets on top
    for(const {a,p} of edges){
      const hit=mk("path"); hit.setAttribute("class","hit"); hit.setAttribute("d",p.d); hit.dataset.id=a.id; wires.appendChild(hit);
    }
    positionApop();
  }
  function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

  /* ---------------- Selection & mini toolbars ---------------- */
  let sel = new Set();          // selected box ids (multi)
  let gbar=null;

  function descendantsOf(id){
    const out=new Set(); const seen=new Set([id]); const q=[id];
    while(q.length){ const cur=q.shift();
      state.arrows.forEach(a=>{ if(a.type==="direct"&&a.from===cur&&!seen.has(a.to)){ seen.add(a.to); out.add(a.to); q.push(a.to); } });
    }
    return out;
  }
  function selectBox(id,additive){
    selArrow=null; pendingSrc=null;
    if(additive){ if(sel.has(id)) sel.delete(id); else sel.add(id); }
    else sel=new Set([id]);
    if(!sel.size){ deselectAll(); return; }
    applySelectionVisuals();
  }
  function selectSubtree(id){
    selArrow=null; pendingSrc=null;
    sel=new Set([id,...descendantsOf(id)]);
    applySelectionVisuals();
  }
  function selectWithin(rect){          // marquee: select boxes intersecting rect (canvas coords)
    const hit=new Set();
    state.boxes.forEach(b=>{ const r=boxRect(b);
      if(r.x< rect.x2 && r.x+r.w> rect.x1 && r.y< rect.y2 && r.y+r.h> rect.y1) hit.add(b.id); });
    sel=hit; selArrow=null;
    if(!sel.size){ deselectAll(); return; }
    applySelectionVisuals();
  }
  function applySelectionVisuals(){
    selBox = sel.size===1 ? [...sel][0] : null;
    document.querySelectorAll(".node").forEach(n=>{ n.classList.toggle("sel",sel.has(n.dataset.id)); n.classList.remove("pending"); });
    refreshSame(); renderArrows();
    if(sel.size===1){ clearGroupBar(); showMini(selBox); }
    else { clearMini(); showGroupBar(); }
  }
  function refreshSame(){
    document.querySelectorAll(".node").forEach(n=>n.classList.remove("same"));
    if(!selBox) return;
    const b=state.boxes.find(x=>x.id===selBox); if(!b||b.kind==="division") return;
    const k=(b.name||"").trim().toLowerCase(); if(!k) return;
    state.boxes.forEach(o=>{ if(o.id!==selBox&&o.kind!=="division"&&(o.name||"").trim().toLowerCase()===k){ const e=nodeEls.get(o.id); e&&e.classList.add("same"); }});
  }
  function deselectAll(){
    sel.clear(); selBox=selArrow=pendingSrc=null;
    document.querySelectorAll(".node").forEach(n=>n.classList.remove("sel","pending","same"));
    clearMini(); clearGroupBar(); renderArrows();
  }
  function clearMini(){ if(mini){mini.remove();mini=null;} if(apop){apop.remove();apop=null;} }
  function clearGroupBar(){ if(gbar){gbar.remove();gbar=null;} }

  function deleteSelection(){
    if(!sel.size) return;
    pushHistory();
    const ids=new Set(sel);
    state.boxes=state.boxes.filter(b=>!ids.has(b.id));
    state.arrows=state.arrows.filter(a=>!ids.has(a.from)&&!ids.has(a.to));
    sel.clear(); selBox=null;
    renderBoxes(); renderArrows(); clearMini(); clearGroupBar(); afterChange();
  }

  function showMini(id){
    clearMini();
    const b=state.boxes.find(x=>x.id===id); if(!b) return;
    mini=document.createElement("div"); mini.className="mini";
    const typ=document.createElement("div"); typ.className="typ";
    const tr=document.createElement("button"); tr.textContent="Role"; tr.className=b.kind!=="division"?"active":"";
    tr.onclick=(e)=>{ e.stopPropagation(); convertKind(id,"role"); };
    const td=document.createElement("button"); td.textContent="Division"; td.className=b.kind==="division"?"active":"";
    td.onclick=(e)=>{ e.stopPropagation(); convertKind(id,"division"); };
    typ.appendChild(tr); typ.appendChild(td); mini.appendChild(typ);
    const sep0=document.createElement("div"); sep0.className="sep"; mini.appendChild(sep0);
    COLORS.forEach(c=>{
      const s=document.createElement("div"); s.className="swatch"+(b.color===c?" active":"");
      s.style.background=c; s.title="Set division colour";
      s.onclick=(e)=>{ e.stopPropagation(); pushHistory(); b.color=c; renderBoxes(); buildLegend(); applySelectionVisuals(); afterChange(); };
      mini.appendChild(s);
    });
    const sep=document.createElement("div"); sep.className="sep"; mini.appendChild(sep);
    const team=document.createElement("button"); team.title="Select this box and everyone reporting under it";
    team.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="9" y="3" width="6" height="5" rx="1"/><rect x="3" y="16" width="6" height="5" rx="1"/><rect x="15" y="16" width="6" height="5" rx="1"/><path d="M12 8v4M6 16v-2h12v2"/></svg>';
    team.onclick=(e)=>{ e.stopPropagation(); selectSubtree(id); };
    const dup=document.createElement("button"); dup.title="Duplicate role";
    dup.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>';
    dup.onclick=(e)=>{ e.stopPropagation(); duplicateBox(id); };
    const del=document.createElement("button"); del.className="del"; del.title="Delete role";
    del.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>';
    del.onclick=(e)=>{ e.stopPropagation(); deleteBox(id); };
    mini.appendChild(team); mini.appendChild(dup); mini.appendChild(del);
    stage.appendChild(mini);
    positionMini();
  }
  function positionMini(){
    if(!mini||!selBox) return;
    const b=state.boxes.find(x=>x.id===selBox); if(!b){ clearMini(); return; }
    const p=toStage(b.x,b.y);
    const h=mini.offsetHeight || 50;  // fallback height if not laid out yet
    mini.style.left=Math.max(8, Math.min(p.x, stage.clientWidth-mini.offsetWidth-8))+"px";
    mini.style.top=Math.max(8, p.y-h-8)+"px";
  }
  function showGroupBar(){
    clearGroupBar();
    if(sel.size<2) return;
    gbar=document.createElement("div"); gbar.className="gbar";
    const lab=document.createElement("span"); lab.className="lab"; lab.textContent=sel.size+" selected"; gbar.appendChild(lab);
    const sep=document.createElement("div"); sep.className="sep"; gbar.appendChild(sep);
    COLORS.forEach(c=>{ const s=document.createElement("div"); s.className="swatch"; s.style.background=c; s.title="Colour all selected";
      s.onclick=(e)=>{ e.stopPropagation(); pushHistory(); sel.forEach(id=>{const b=_box(id); if(b)b.color=c;}); renderBoxes(); buildLegend(); applySelectionVisuals(); afterChange(); };
      gbar.appendChild(s); });
    const sep2=document.createElement("div"); sep2.className="sep"; gbar.appendChild(sep2);
    const del=document.createElement("button"); del.className="del"; del.title="Delete all selected";
    del.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>';
    del.onclick=(e)=>{ e.stopPropagation(); deleteSelection(); };
    gbar.appendChild(del);
    stage.appendChild(gbar); positionGroupBar();
  }
  function positionGroupBar(){
    if(!gbar||sel.size<2) return;
    let top=Infinity, leftAtTop=0;
    sel.forEach(id=>{ const b=_box(id); if(!b)return; if(b.y<top){ top=b.y; leftAtTop=b.x; } });
    const p=toStage(leftAtTop,top);
    const h=gbar.offsetHeight || 40;
    gbar.style.left=Math.max(8, Math.min(p.x, stage.clientWidth-gbar.offsetWidth-8))+"px";
    gbar.style.top=Math.max(8, p.y-h-8)+"px";
  }

  function selectArrow(id){
    sel.clear(); selBox=null; selArrow=id; deselectNodesVisual(); clearMini(); clearGroupBar(); renderArrows(); showApop();
  }
  function deselectNodesVisual(){ document.querySelectorAll(".node").forEach(n=>n.classList.remove("sel","same")); }
  function showApop(){
    if(apop){apop.remove();apop=null;}
    const a=state.arrows.find(x=>x.id===selArrow); if(!a) return;
    apop=document.createElement("div"); apop.className="apop";
    const d=document.createElement("button"); d.innerHTML='<span class="ld"></span>Direct'; d.className=a.type==="direct"?"active":"";
    d.onclick=(e)=>{e.stopPropagation(); pushHistory(); a.type="direct"; renderArrows(); showApop(); afterChange();};
    const s=document.createElement("button"); s.innerHTML='<span class="ls"></span>Secondary'; s.className=a.type==="secondary"?"active":"";
    s.onclick=(e)=>{e.stopPropagation(); pushHistory(); a.type="secondary"; renderArrows(); showApop(); afterChange();};
    const x=document.createElement("button"); x.className="del"; x.textContent="Delete";
    x.onclick=(e)=>{e.stopPropagation(); pushHistory(); state.arrows=state.arrows.filter(o=>o.id!==a.id); selArrow=null; renderArrows(); if(apop){apop.remove();apop=null;} afterChange();};
    apop.appendChild(d); apop.appendChild(s); apop.appendChild(x);
    stage.appendChild(apop); positionApop();
  }
  function positionApop(){
    if(!apop) return; const a=state.arrows.find(x=>x.id===selArrow); if(!a){apop.remove();apop=null;return;}
    const p=pathFor(a); if(!p) return;
    const tmp=document.createElementNS("http://www.w3.org/2000/svg","path"); tmp.setAttribute("d",p.d);
    wires.appendChild(tmp); let mid; try{ const L=tmp.getTotalLength(); mid=tmp.getPointAtLength(L/2);}catch(e){ mid=p.end; } tmp.remove();
    const s=toStage(mid.x,mid.y);
    apop.style.left=s.x+"px"; apop.style.top=(s.y-22)+"px";
  }

  /* ---------------- Connect logic ---------------- */
  function handleConnect(id){
    const el=nodeEls.get(id);
    if(!pendingSrc){ pendingSrc=id; el&&el.classList.add("pending"); setHint(); return; }
    if(pendingSrc===id){ el&&el.classList.remove("pending"); pendingSrc=null; setHint(); return; }
    // create arrow if not duplicate
    const exists=state.arrows.find(a=>a.from===pendingSrc&&a.to===id);
    if(!exists){ pushHistory(); state.arrows.push({id:uid("a"),from:pendingSrc,to:id,type:lineStyle}); }
    const pe=nodeEls.get(pendingSrc); pe&&pe.classList.remove("pending");
    pendingSrc=null; renderArrows(); setHint(); afterChange();
  }
  function cancelPending(){ if(pendingSrc){ const e=nodeEls.get(pendingSrc); e&&e.classList.remove("pending"); pendingSrc=null; setHint(); } }

  /* ---------------- View: zoom & pan ---------------- */
  function toStage(cx,cy){ return {x:panX+cx*zoom, y:panY+cy*zoom}; }
  function clampZ(z){ return Math.min(ZMAX,Math.max(ZMIN,z)); }
  function applyView(){
    content.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
    const lvl=document.getElementById("zoomLvl"); if(lvl) lvl.textContent=Math.round(zoom*100)+"%";
    positionOverlays();
  }
  function positionOverlays(){ positionMini(); positionApop(); positionGroupBar(); }
  function zoomAt(factor,sx,sy){
    const nz=clampZ(zoom*factor); if(nz===zoom) return;
    const cx=(sx-panX)/zoom, cy=(sy-panY)/zoom;
    zoom=nz; panX=sx-cx*zoom; panY=sy-cy*zoom; applyView();
  }
  function zoomBy(factor){ zoomAt(factor, stage.clientWidth/2, stage.clientHeight/2); }
  function resetZoom(){ if(zoom!==1) zoomAt(1/zoom, stage.clientWidth/2, stage.clientHeight/2); }
  function fitView(){
    if(!state.boxes.length){ zoom=1; panX=60; panY=30; applyView(); return; }
    let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    state.boxes.forEach(b=>{ const r=boxRect(b); minX=Math.min(minX,r.x);minY=Math.min(minY,r.y);maxX=Math.max(maxX,r.x+r.w);maxY=Math.max(maxY,r.y+r.h); });
    const pad=44, bw=Math.max(1,maxX-minX), bh=Math.max(1,maxY-minY);
    zoom=clampZ(Math.min((stage.clientWidth-pad*2)/bw,(stage.clientHeight-pad*2)/bh,1.4));
    panX=(stage.clientWidth-bw*zoom)/2 - minX*zoom;
    panY=(stage.clientHeight-bh*zoom)/2 - minY*zoom;
    applyView();
  }

  /* ---------------- Pointer: drag / pan / pinch ---------------- */
  let drag=null, pan=null, pinch=null, marquee=null;
  const pointers=new Map();
  const pdist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
  const pmid =(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
  function startMarquee(e){
    const r=stage.getBoundingClientRect();
    const el=document.createElement("div"); el.className="marquee"; stage.appendChild(el);
    marquee={ ax:e.clientX-r.left, ay:e.clientY-r.top, el, moved:false, cur:null };
  }

  stage.addEventListener("pointerdown",(e)=>{
    if(e.target.closest(".mini")||e.target.closest(".apop")||e.target.closest(".zoom")||e.target.closest(".legend")) return;
    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pointers.size===2){ startPinch(); return; }
    const node=e.target.closest(".node");
    const hit=e.target.closest(".hit");
    if(mode==="connect"){
      if(node){ handleConnect(node.dataset.id); e.preventDefault(); return; }
      pan={sx:e.clientX,sy:e.clientY,px:panX,py:panY,moved:false}; stage.setPointerCapture(e.pointerId); return;
    }
    if(node){
      const id=node.dataset.id;
      const field=e.target.closest("input");
      if(e.shiftKey){ selectBox(id,true); e.preventDefault(); return; }   // shift-click toggles, no drag
      let ids;
      if(sel.has(id) && sel.size>1){ ids=[...sel]; }                      // grab the whole group
      else { selectBox(id); ids=[id]; }
      if(!field){
        e.preventDefault();
        const p=toCanvas(e);
        drag={ px0:p.x, py0:p.y, moved:false, items: ids.map(i=>{const b=_box(i); return {id:i,sx:b.x,sy:b.y};}) };
        clearMini(); clearGroupBar();  // hide overlays while dragging for clear view
        stage.setPointerCapture(e.pointerId);
      }
      return;
    }
    if(hit){ selectArrow(hit.dataset.id); return; }
    if(e.shiftKey){ startMarquee(e); stage.setPointerCapture(e.pointerId); return; }   // shift-drag = rubber-band select
    pan={sx:e.clientX,sy:e.clientY,px:panX,py:panY,moved:false}; stage.setPointerCapture(e.pointerId);
  });

  stage.addEventListener("pointermove",(e)=>{
    if(pointers.has(e.pointerId)) pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pinch){ updatePinch(); return; }
    if(drag){
      const p=toCanvas(e); const dx=p.x-drag.px0, dy=p.y-drag.py0;
      drag.items.forEach(it=>{ const b=_box(it.id); if(!b)return; b.x=snap(Math.round(it.sx+dx)); b.y=snap(Math.round(it.sy+dy)); updateNodePos(b); });
      drag.moved=true; positionMini(); positionGroupBar(); renderArrows(); return;
    }
    if(marquee){
      const r=stage.getBoundingClientRect();
      const bx=e.clientX-r.left, by=e.clientY-r.top;
      const x=Math.min(marquee.ax,bx), y=Math.min(marquee.ay,by), w=Math.abs(bx-marquee.ax), h=Math.abs(by-marquee.ay);
      marquee.el.style.left=x+"px"; marquee.el.style.top=y+"px"; marquee.el.style.width=w+"px"; marquee.el.style.height=h+"px";
      marquee.moved=true; marquee.cur={x,y,w,h};
      return;
    }
    if(pan){
      const dx=e.clientX-pan.sx, dy=e.clientY-pan.sy;
      if(!pan.moved && Math.abs(dx)+Math.abs(dy)>3){ pan.moved=true; stage.classList.add("panning"); }
      panX=pan.px+dx; panY=pan.py+dy; applyView();
    }
  });

  function endPointer(e){
    pointers.delete(e.pointerId);
    if(pinch && pointers.size<2) pinch=null;
    if(drag){ 
      if(drag.moved){ pushHistory(); afterChange(); }
      applySelectionVisuals();  // restore toolbars after drag
      drag=null;
    }
    if(marquee){
      if(marquee.moved && marquee.cur){
        const x1=(marquee.cur.x-panX)/zoom, y1=(marquee.cur.y-panY)/zoom;
        const x2=(marquee.cur.x+marquee.cur.w-panX)/zoom, y2=(marquee.cur.y+marquee.cur.h-panY)/zoom;
        selectWithin({x1,y1,x2,y2});
      } else deselectAll();
      marquee.el.remove(); marquee=null;
    }
    if(pan){
      if(!pan.moved){ if(mode==="connect") cancelPending(); deselectAll(); }
      pan=null; stage.classList.remove("panning");
    }
  }
  stage.addEventListener("pointerup",endPointer);
  stage.addEventListener("pointercancel",endPointer);

  function startPinch(){
    drag=null; pan=null; stage.classList.remove("panning");
    if(marquee){ marquee.el.remove(); marquee=null; }
    const p=[...pointers.values()];
    pinch={d0:pdist(p[0],p[1]),z0:zoom,m0:pmid(p[0],p[1]),px:panX,py:panY};
  }
  function updatePinch(){
    const p=[...pointers.values()]; if(p.length<2) return;
    const r=stage.getBoundingClientRect();
    const m=pmid(p[0],p[1]); const sx=pinch.m0.x-r.left, sy=pinch.m0.y-r.top;
    const nz=clampZ(pinch.z0*(pdist(p[0],p[1])/pinch.d0));
    const cx=(sx-pinch.px)/pinch.z0, cy=(sy-pinch.py)/pinch.z0;
    zoom=nz; panX=sx-cx*nz+(m.x-pinch.m0.x); panY=sy-cy*nz+(m.y-pinch.m0.y); applyView();
  }

  stage.addEventListener("wheel",(e)=>{
    e.preventDefault();
    const r=stage.getBoundingClientRect();
    if(e.ctrlKey||e.metaKey){ zoomAt(e.deltaY<0?1.12:0.89, e.clientX-r.left, e.clientY-r.top); }
    else { panX-=(e.shiftKey?e.deltaY:e.deltaX||0); panY-=(e.shiftKey?0:e.deltaY); applyView(); }
  },{passive:false});

  function toCanvas(e){ const r=stage.getBoundingClientRect(); return {x:(e.clientX-r.left-panX)/zoom, y:(e.clientY-r.top-panY)/zoom}; }
  function visibleCenter(){ return {x:(stage.clientWidth/2-panX)/zoom, y:(stage.clientHeight/2-panY)/zoom}; }

  /* ---------------- Legend ---------------- */
  function buildLegend(){
    const rows=document.getElementById("legendRows"); rows.innerHTML="";
    const used=[...new Set(state.boxes.map(b=>b.color))];
    const order=COLORS.filter(c=>used.includes(c));
    order.forEach(c=>{
      const def=PALETTE.find(p=>p.c===c); const label=(c in state.legend)?state.legend[c]:(def?def.n:"");
      const row=document.createElement("div"); row.className="lrow";
      const chip=document.createElement("div"); chip.className="chip"; chip.style.background=c;
      const inp=document.createElement("input"); inp.value=label; inp.placeholder="Name this group…";
      inp.oninput=()=>{ state.legend[c]=inp.value; afterChange(true); };
      row.appendChild(chip); row.appendChild(inp); rows.appendChild(row);
    });
    if(!order.length){ rows.innerHTML='<div style="font-size:12px;color:var(--faint);padding:4px 6px">Colour a box to group it.</div>'; }
  }

  /* ---------------- After change ---------------- */
  let saveT=null;
  function afterChange(light){
    if(!light){ buildLegend(); updateMultiBadges(); }
    clearTimeout(saveT); saveT=setTimeout(autosave,400);
  }

  /* ---------------- Mode / hint ---------------- */
  function setMode(m){
    mode=m; cancelPending();
    stage.classList.toggle("connect",m==="connect");
    document.getElementById("connectBtn").classList.toggle("on",m==="connect");
    document.getElementById("connectBtn").classList.toggle("primary",false);
    if(m==="connect") deselectAll();
    setHint();
  }
  function setHint(){
    if(mode==="connect"){
      hintText.innerHTML = pendingSrc
        ? `Now click the <b>report</b> (or click the same box to cancel)`
        : `Click a <b>manager</b>, then their report — drawing <b>${lineStyle==="direct"?"direct":"secondary"}</b> lines`;
    } else {
      hintText.innerHTML = `Drag to move · double-click text to edit · select a box for colours`;
    }
  }

  /* ---------------- File I/O ---------------- */
  function save(){
    const defaultName="org-chart";
    const filename=prompt("Save as:",defaultName);
    if(!filename)return;
    const name=(filename.endsWith(".json")?filename:filename+".json");
    const data=JSON.stringify({app:"org-chart-builder",version:1,...state},null,2);
    const blob=new Blob([data],{type:"application/json"});
    download(blob,name);
  }
  function openFile(file){
    const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result); pushHistory(); state=normalize(d); fullRender(); afterChange(); }catch(e){ alert("That file could not be read as an org chart."); } };
    r.readAsText(file);
  }
  function download(blob,name){
    const u=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(u),1000);
  }

  /* ---------------- PNG export ---------------- */
  function exportPNG(){
    if(!state.boxes.length){ alert("Add some roles first."); return; }
    const pad=40;
    let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    state.boxes.forEach(b=>{ const r=boxRect(b); minX=Math.min(minX,r.x);minY=Math.min(minY,r.y);maxX=Math.max(maxX,r.x+r.w);maxY=Math.max(maxY,r.y+r.h); });
    const used=[...new Set(state.boxes.map(b=>b.color))].filter(c=>{const d=PALETTE.find(p=>p.c===c);const l=(c in state.legend)?state.legend[c]:(d?d.n:"");return l;});
    const legendH = used.length? (used.length*20+30) : 0;
    const W=maxX-minX+pad*2, H=maxY-minY+pad*2+legendH;
    const ox=pad-minX, oy=pad-minY;
    let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
    svg+=`<rect width="${W}" height="${H}" fill="#ffffff"/>`;
    // arrows (same routing as on screen, with white halos)
    rebuildBus();
    const epaths=[];
    state.arrows.forEach(a=>{ const p=pathFor(a); if(p) epaths.push({a,p,d:shiftPath(p.d,ox,oy),e:{x:p.end.x+ox,y:p.end.y+oy}}); });
    epaths.forEach(({d,e,p})=>{ svg+=`<path d="${d}" fill="none" stroke="#ffffff" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>`;
      svg+=`<polygon points="${headPts(e,p.dir,2.5)}" fill="#ffffff" stroke="#ffffff" stroke-width="3"/>`; });
    epaths.forEach(({a,d})=>{ const col=a.type==="secondary"?"#93a0b2":"#3a4a66";
      svg+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"${a.type==="secondary"?' stroke-dasharray="6 5"':''}/>`; });
    epaths.forEach(({a,e,p})=>{ const col=a.type==="secondary"?"#93a0b2":"#3a4a66";
      svg+=`<polygon points="${headPts(e,p.dir,0)}" fill="${col}"/>`; });
    // boxes
    state.boxes.forEach(b=>{
      const r=boxRect(b); const x=r.x+ox, y=r.y+oy;
      svg+=`<g>`;
      if(b.kind==="division"){
        svg+=`<rect x="${x}" y="${y}" width="${r.w}" height="${r.h}" rx="10" fill="${rgba(b.color,0.10)}" stroke="${rgba(b.color,0.45)}"/>`;
        svg+=`<rect x="${x+1}" y="${y+1}" width="${r.w-2}" height="6" rx="2" fill="${b.color}"/>`;
        svg+=`<text x="${x+r.w/2}" y="${y+r.h/2+5}" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Arial" font-size="13" font-weight="700" letter-spacing="0.5" fill="#16233b">${esc((b.role||"Division").toUpperCase())}</text>`;
      } else {
        svg+=`<rect x="${x}" y="${y}" width="${r.w}" height="${r.h}" rx="10" fill="#ffffff" stroke="#cdd5df"/>`;
        svg+=`<rect x="${x+1}" y="${y+1}" width="${r.w-2}" height="5" rx="2" fill="${b.color}"/>`;
        svg+=`<text x="${x+12}" y="${y+27}" font-family="-apple-system,Segoe UI,Roboto,Arial" font-size="13.5" font-weight="700" fill="#16233b">${esc(b.role||"Role")}</text>`;
        svg+=`<text x="${x+12}" y="${y+45}" font-family="-apple-system,Segoe UI,Roboto,Arial" font-size="12.5" fill="#5d6b80">${esc(b.name||"")}</text>`;
      }
      svg+=`</g>`;
    });
    if(legendH){
      let ly=H-legendH+10;
      svg+=`<text x="${pad}" y="${ly}" font-family="-apple-system,Segoe UI,Roboto,Arial" font-size="11" font-weight="700" fill="#8b97a8" letter-spacing="1">DIVISIONS</text>`;
      ly+=8;
      used.forEach(c=>{ const d=PALETTE.find(p=>p.c===c); const l=(c in state.legend)?state.legend[c]:(d?d.n:"");
        ly+=18; svg+=`<rect x="${pad}" y="${ly-10}" width="12" height="12" rx="3" fill="${c}"/>`;
        svg+=`<text x="${pad+20}" y="${ly}" font-family="-apple-system,Segoe UI,Roboto,Arial" font-size="12.5" fill="#16233b">${esc(l)}</text>`; });
    }
    svg+=`</svg>`;
    const img=new Image(); const blob=new Blob([svg],{type:"image/svg+xml"}); const url=URL.createObjectURL(blob);
    img.onload=()=>{
      const sc=2; const cv=document.createElement("canvas"); cv.width=W*sc; cv.height=H*sc;
      const ctx=cv.getContext("2d"); ctx.scale(sc,sc); ctx.drawImage(img,0,0);
      URL.revokeObjectURL(url);
      cv.toBlob(b=>download(b,"org-chart.png"),"image/png");
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); download(new Blob([svg],{type:"image/svg+xml"}),"org-chart.svg"); };
    img.src=url;
  }
  function shiftPath(d,ox,oy){
    let i=0;
    return d.replace(/[A-Za-z]|-?\d+(\.\d+)?/g,(tok)=>{
      if(/[A-Za-z]/.test(tok)){ i=0; return tok; }
      const n=parseFloat(tok); const v=(i%2===0)?n+ox:n+oy; i++; return v.toFixed(1);
    });
  }
  function esc(s){ return (s||"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }

  /* ---------------- Example ---------------- */
  function loadExample(){
    pushHistory();
    const N=COLORS[0],US=COLORS[1],GL=COLORS[2],BO=COLORS[3];
    const R=(role,name,x,y,c)=>({id:uid("b"),kind:"role",role,name,x,y,color:c});
    const D=(role,x,y,c)=>({id:uid("b"),kind:"division",role,name:"",x,y,color:c});
    const board=D("Board of Directors",520,40,N);
    const ceo  =R("President / CEO","Trevor",520,160,N);
    const usH  =D("US Operations",230,300,US);
    const glH  =D("Global Consulting",520,300,GL);
    const boH  =D("Back Office",810,300,BO);
    const site =R("Site Director","",170,430,US);
    const grant=R("Grants & Dev.","",300,430,US);
    const coord=R("Africa Coordinator","Greg",460,430,GL);
    const latam=R("Latin America","Joel",640,430,GL);
    const ops  =R("Operations Mgr","Kelly",760,430,BO);
    const comm =R("Communications","Greg",900,430,BO);
    state.boxes=[board,ceo,usH,glH,boH,site,grant,coord,latam,ops,comm];
    const A=(f,t,ty="direct")=>({id:uid("a"),from:f.id,to:t.id,type:ty});
    state.arrows=[A(board,ceo),A(ceo,usH),A(ceo,glH),A(ceo,boH),
      A(usH,site),A(usH,grant),A(glH,coord),A(glH,latam),A(boH,ops),A(boH,comm),
      A(ceo,comm,"secondary")];
    state.legend={[US]:"US",[GL]:"Global",[BO]:"Back office"};
    fullRender(); afterChange();
    fitView();
  }

  /* ---------------- Wiring ---------------- */
  function fullRender(){ renderBoxes(); renderArrows(); buildLegend(); deselectAll(); }

  document.getElementById("addBtn").onclick=()=>{ if(mode==="connect")setMode("select"); addBox("role"); };
  document.getElementById("addDivBtn").onclick=()=>{ if(mode==="connect")setMode("select"); addBox("division"); };
  document.getElementById("emptyAdd").onclick=()=>addBox("role");
  document.getElementById("exampleBtn").onclick=loadExample;
  document.getElementById("connectBtn").onclick=()=>setMode(mode==="connect"?"select":"connect");
  document.getElementById("styleSeg").addEventListener("click",e=>{
    const b=e.target.closest("button[data-style]"); if(!b) return;
    lineStyle=b.dataset.style;
    document.querySelectorAll("#styleSeg button").forEach(x=>x.classList.toggle("active",x===b));
    if(selArrow){ const a=state.arrows.find(o=>o.id===selArrow); if(a){pushHistory();a.type=lineStyle;renderArrows();showApop();afterChange();} }
    setHint();
  });
  document.getElementById("snapBtn").onclick=()=>{
    snapGrid=!snapGrid;
    document.getElementById("snapBtn").classList.toggle("on",snapGrid);
  };
  document.getElementById("saveBtn").onclick=save;
  document.getElementById("openBtn").onclick=()=>document.getElementById("fileInput").click();
  document.getElementById("fileInput").addEventListener("change",e=>{ if(e.target.files[0]){openFile(e.target.files[0]); e.target.value="";} });
  document.getElementById("pngBtn").onclick=exportPNG;
  document.getElementById("zoomIn").onclick=()=>zoomBy(1.2);
  document.getElementById("zoomOut").onclick=()=>zoomBy(1/1.2);
  document.getElementById("zoomLvl").onclick=resetZoom;
  document.getElementById("zoomFit").onclick=fitView;
  document.getElementById("fitTop").onclick=fitView;
  document.getElementById("legendToggle").onclick=()=>{
    const l=document.getElementById("legend"); l.classList.toggle("collapsed");
    document.getElementById("legendToggle").textContent=l.classList.contains("collapsed")?"▸":"▾";
  };

  document.addEventListener("keydown",e=>{
    const typing=document.activeElement&&/INPUT|TEXTAREA/.test(document.activeElement.tagName);
    if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="z"){ e.preventDefault(); undo(); return; }
    if(typing) return;
    if(e.key==="a"||e.key==="A"){ e.preventDefault(); addBox("role"); }
    else if(e.key==="d"||e.key==="D"){ e.preventDefault(); addBox("division"); }
    else if(e.key==="c"||e.key==="C"){ e.preventDefault(); setMode(mode==="connect"?"select":"connect"); }
    else if(e.key==="f"||e.key==="F"){ e.preventDefault(); fitView(); }
    else if(e.key==="g"||e.key==="G"){ e.preventDefault(); snapGrid=!snapGrid; document.getElementById("snapBtn").classList.toggle("on",snapGrid); }
    else if(e.key==="0"){ e.preventDefault(); resetZoom(); }
    else if(e.key==="="||e.key==="+"){ e.preventDefault(); zoomBy(1.2); }
    else if(e.key==="-"||e.key==="_"){ e.preventDefault(); zoomBy(1/1.2); }
    else if(e.key==="Delete"||e.key==="Backspace"){
      if(sel.size){ e.preventDefault(); deleteSelection(); }
      else if(selArrow){ e.preventDefault(); pushHistory(); state.arrows=state.arrows.filter(a=>a.id!==selArrow); selArrow=null; renderArrows(); if(apop){apop.remove();apop=null;} afterChange(); }
    }
    else if(e.key==="Escape"){ if(mode==="connect")setMode("select"); else deselectAll(); }
  });
  function undo(){ if(!history.length) return; state=normalize(history.pop()); fullRender(); autosave(); }

  /* init */
  (async function(){
    const restored=await tryRestore();
    document.getElementById("snapBtn").classList.add("on");  // snap is on by default
    fullRender(); setMode("select");
    if(restored && state.boxes.length){ fitView(); } else { applyView(); }
    window.addEventListener("resize",positionOverlays);
  })();
})();
</script>
</body>
